name: qcant
channels:
  - conda-forge
  - defaults
dependencies:
  - python>=3.11,<3.13
  - pip

  # Runtime (lightweight base)
  - numpy<2
  - scipy<2
  - pennylane
  - pyscf
  - openfermion
  - autoray<0.7

  # Testing
  - pytest
  - pytest-cov

  # Documentation
  - sphinx
  - pydata-sphinx-theme
  - sphinx-design
  - sphinx-copybutton

  # Examples
  - matplotlib

  # Note: additional optional dependencies may still improve performance
  # (e.g. pennylane-lightning, qulacs) but are not required in the base env.
